<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">How the AI Assisted Enforcement POC Works</title>
  <desc id="desc">A plain language workflow diagram for residents, city staff, officers, and analytics teams.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
    <style>
      text{font-family:Arial,Helvetica,sans-serif}.bg{fill:#f8fafc}.ink{fill:#0f172a}.muted{fill:#475569}.blue{fill:#2563eb}.green{fill:#047857}.amber{fill:#c45a00}.card{fill:#fff;stroke:#dbe3ef;stroke-width:1.4;filter:url(#shadow)}.soft{fill:#f8fafc;stroke:#dbe3ef;stroke-width:1.4}.blueSoft{fill:#eff6ff}.greenSoft{fill:#ecfdf5}.amberSoft{fill:#fff7ed}.chipB{fill:#eaf2ff;stroke:#c7d9ff}.chipG{fill:#eafaf2;stroke:#c7ead8}.chipA{fill:#fff3e3;stroke:#ffd6a8}.title{font-size:46px;font-weight:800}.subtitle{font-size:23px}.section{font-size:20px;font-weight:800}.label{font-size:15px;font-weight:800}.body{font-size:17px}.small{font-size:14px}.tiny{font-size:12px}.stepTitle{font-size:16px;font-weight:800}.num{font-size:18px;font-weight:800;fill:white}.arrow{stroke:#64748b;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}.icon{fill:none;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.iconBlue{stroke:#2563eb}.iconGreen{stroke:#059669}.iconAmber{stroke:#d97706}
    </style>
  </defs>

  <rect class="bg" width="1200" height="900"/>
  <text x="600" y="55" text-anchor="middle" class="title ink">How the AI Assisted Enforcement POC Works</text>
  <text x="600" y="88" text-anchor="middle" class="subtitle muted">From a resident complaint to a workload signal and clear closure</text>

  <rect x="60" y="120" width="520" height="74" rx="18" class="blueSoft"/>
  <circle cx="95" cy="157" r="14" class="blue"/>
  <circle cx="120" cy="157" r="14" class="blue" opacity="0.75"/>
  <path d="M74 186c8-24 34-24 42 0M100 186c8-24 34-24 42 0" class="blue"/>
  <text x="160" y="151" class="section blue">FOR RESIDENTS</text>
  <text x="160" y="176" class="body ink">Easy to report. Clear updates.</text>

  <rect x="620" y="120" width="520" height="74" rx="18" class="greenSoft"/>
  <circle cx="655" cy="157" r="15" fill="#059669"/>
  <path d="M633 186c9-27 35-27 44 0" fill="#059669"/>
  <text x="710" y="151" class="section green">FOR CITY STAFF</text>
  <text x="710" y="176" class="body ink">Smarter triage. Better visibility.</text>

  <g transform="translate(60 230)">
    <g>
      <rect class="card" width="150" height="190" rx="16"/>
      <circle cx="25" cy="26" r="17" fill="#0b1835"/><text x="25" y="32" text-anchor="middle" class="num">1</text>
      <text x="75" y="58" text-anchor="middle" class="stepTitle ink">Resident</text><text x="75" y="78" text-anchor="middle" class="stepTitle ink">intake</text>
      <rect x="57" y="94" width="36" height="58" rx="6" class="icon iconBlue"/><circle cx="103" cy="123" r="25" fill="#477ee8"/><circle cx="94" cy="123" r="3" fill="#fff"/><circle cx="104" cy="123" r="3" fill="#fff"/><circle cx="114" cy="123" r="3" fill="#fff"/>
      <text x="75" y="166" text-anchor="middle" class="small ink">Issue submitted</text>
    </g>
    <path class="arrow" d="M162 96h24m-8-8 8 8-8 8"/>
    <g transform="translate(195 0)">
      <rect class="card" width="150" height="190" rx="16"/>
      <circle cx="25" cy="26" r="17" fill="#0b1835"/><text x="25" y="32" text-anchor="middle" class="num">2</text>
      <text x="75" y="58" text-anchor="middle" class="stepTitle ink">Structured</text><text x="75" y="78" text-anchor="middle" class="stepTitle ink">case</text>
      <rect x="55" y="92" width="45" height="62" rx="6" class="icon iconBlue"/><path d="M64 110h25M64 128h25M64 146h18" class="icon iconBlue" stroke-width="4"/><circle cx="105" cy="148" r="20" fill="#477ee8"/><path d="M96 148l8 8 17-22" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/>
      <text x="75" y="166" text-anchor="middle" class="small ink">Clean data</text>
    </g>
    <path class="arrow" d="M357 96h24m-8-8 8 8-8 8"/>
    <g transform="translate(390 0)">
      <rect class="card" width="150" height="190" rx="16"/>
      <circle cx="25" cy="26" r="17" fill="#0b1835"/><text x="25" y="32" text-anchor="middle" class="num">3</text>
      <text x="75" y="58" text-anchor="middle" class="stepTitle ink">Staff triage</text><text x="75" y="78" text-anchor="middle" class="stepTitle ink">and priority</text>
      <circle cx="58" cy="117" r="18" fill="#059669"/><path d="M33 157c6-29 44-29 50 0" fill="#059669"/><rect x="94" y="101" width="35" height="48" rx="4" class="icon iconGreen"/><path d="M105 139v-12M116 139v-24" class="icon iconGreen" stroke-width="4"/>
      <text x="75" y="166" text-anchor="middle" class="small ink">Review context</text>
    </g>
    <path class="arrow" d="M552 96h24m-8-8 8 8-8 8"/>
    <g transform="translate(585 0)">
      <rect class="card" width="150" height="190" rx="16"/>
      <circle cx="25" cy="26" r="17" fill="#0b1835"/><text x="25" y="32" text-anchor="middle" class="num">4</text>
      <text x="75" y="68" text-anchor="middle" class="stepTitle ink">Field follow up</text>
      <path d="M75 92c-22 0-38 16-38 38 0 28 38 65 38 65s38-37 38-65c0-22-16-38-38-38z" fill="#059669"/><circle cx="75" cy="130" r="13" fill="#fff"/><path d="M34 163l30-18 28 18 30-18" class="icon iconGreen" stroke-width="4"/>
      <text x="75" y="166" text-anchor="middle" class="small ink">Observed facts</text>
    </g>
    <path class="arrow" d="M747 96h24m-8-8 8 8-8 8"/>
    <g transform="translate(780 0)">
      <rect class="card" width="150" height="190" rx="16"/>
      <circle cx="25" cy="26" r="17" fill="#0b1835"/><text x="25" y="32" text-anchor="middle" class="num">5</text>
      <text x="75" y="58" text-anchor="middle" class="stepTitle ink">Closure draft</text><text x="75" y="78" text-anchor="middle" class="stepTitle ink">support</text>
      <path d="M56 95h44l28 28v45H56zM100 95v28h28" class="icon iconGreen"/><path d="M70 130h38M70 148h25" class="icon iconGreen" stroke-width="4"/>
      <text x="75" y="166" text-anchor="middle" class="small ink">Staff reviews</text>
    </g>
    <path class="arrow" d="M942 96h24m-8-8 8 8-8 8"/>
    <g transform="translate(975 0)">
      <rect class="card" width="150" height="190" rx="16"/>
      <circle cx="25" cy="26" r="17" fill="#0b1835"/><text x="25" y="32" text-anchor="middle" class="num">6</text>
      <text x="75" y="58" text-anchor="middle" class="stepTitle ink">Supervisor</text><text x="75" y="78" text-anchor="middle" class="stepTitle ink">approval</text>
      <path d="M75 96l42 16v32c0 28-18 48-42 58-24-10-42-30-42-58v-32z" class="icon iconGreen"/><path d="M54 145l15 15 29-35" class="icon iconGreen"/>
      <text x="75" y="166" text-anchor="middle" class="small ink">Human sign off</text>
    </g>
  </g>

  <rect x="60" y="460" width="1080" height="76" rx="16" class="card"/>
  <circle cx="445" cy="498" r="18" fill="#0b1835"/><text x="445" y="505" text-anchor="middle" class="num">7</text>
  <path d="M365 480h48v36h-48zM365 480l24 20 24-20" class="icon iconBlue" stroke-width="4"/>
  <text x="490" y="494" class="section ink">Resident update</text>
  <text x="490" y="518" class="small muted">Approved response sent to the resident</text>

  <text x="600" y="580" text-anchor="middle" class="label ink">SUPPORTED BY</text>
  <g transform="translate(60 610)">
    <rect class="card" width="340" height="165" rx="16"/>
    <path d="M35 130v-32M57 130v-58M79 130V38" class="icon iconBlue"/>
    <text x="115" y="48" class="section blue">NYC 311 Pattern Intelligence</text>
    <text x="115" y="76" class="small ink">Uses 3.4M New York City 311</text>
    <text x="115" y="96" class="small ink">public records from 12 months.</text>
    <rect x="30" y="116" width="92" height="24" rx="8" class="chipB"/><text x="76" y="133" text-anchor="middle" class="tiny blue">NYC 311</text>
    <rect x="132" y="116" width="104" height="24" rx="8" class="chipB"/><text x="184" y="133" text-anchor="middle" class="tiny blue">Similar cases</text>
  </g>
  <g transform="translate(430 610)">
    <rect class="card" width="340" height="165" rx="16"/>
    <path d="M35 120l46-54 45 32 54-74" class="icon iconGreen"/><circle cx="35" cy="120" r="5" fill="#059669"/><circle cx="81" cy="66" r="5" fill="#059669"/><circle cx="126" cy="98" r="5" fill="#059669"/><circle cx="180" cy="24" r="5" fill="#059669"/>
    <text x="115" y="48" class="section green">Operational Analytics</text>
    <text x="115" y="76" class="small ink">Turns data into practical visibility</text>
    <text x="115" y="96" class="small ink">for daily triage and planning.</text>
    <rect x="30" y="116" width="95" height="24" rx="8" class="chipG"/><text x="78" y="133" text-anchor="middle" class="tiny green">Work queue</text>
    <rect x="136" y="116" width="85" height="24" rx="8" class="chipG"/><text x="178" y="133" text-anchor="middle" class="tiny green">Heat map</text>
  </g>
  <g transform="translate(800 610)">
    <rect class="card" width="340" height="165" rx="16"/>
    <path d="M65 36v53l-35 58h90L85 89V36M50 36h50" class="icon iconAmber"/>
    <text x="115" y="48" class="section amber">Stress Testing Lab</text>
    <text x="115" y="76" class="small ink">Tests workload scenarios before</text>
    <text x="115" y="96" class="small ink">pressure becomes a bottleneck.</text>
    <rect x="30" y="116" width="116" height="24" rx="8" class="chipA"/><text x="88" y="133" text-anchor="middle" class="tiny amber">Staff capacity</text>
    <rect x="156" y="116" width="104" height="24" rx="8" class="chipA"/><text x="208" y="133" text-anchor="middle" class="tiny amber">Backlog risk</text>
  </g>

  <rect x="60" y="810" width="1080" height="52" rx="14" class="soft"/>
  <text x="600" y="842" text-anchor="middle" class="body ink">Analytics use 3.4M New York City 311 public records from the past 12 months. Resident submissions are demo data.</text>
</svg>

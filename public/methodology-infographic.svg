<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">How the AI Assisted Enforcement POC Works</title>
  <desc id="desc">Infographic showing how a resident complaint becomes a structured case, is reviewed by staff, followed up in the field, approved by a supervisor, and returned to the resident with support from New York City 311 records, operational analytics, and stress testing.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="blueWash" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="greenWash" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <style>
      .bg{fill:#f8fafc}.ink{fill:#0f172a}.muted{fill:#475569}.subtle{fill:#64748b}.blue{fill:#1d4ed8}.green{fill:#047857}.amber{fill:#c45a00}.purple{fill:#6d28d9}.card{fill:#fff;stroke:#dbe3ef;stroke-width:1.5;filter:url(#shadow)}.soft{fill:#f8fafc;stroke:#dbe3ef;stroke-width:1.5}.chipBlue{fill:#eaf2ff;stroke:#c7d9ff}.chipGreen{fill:#eafaf2;stroke:#c7ead8}.chipAmber{fill:#fff3e3;stroke:#ffd6a8}.small{font:500 22px Inter,Arial,sans-serif}.xs{font:500 18px Inter,Arial,sans-serif}.body{font:400 24px Inter,Arial,sans-serif}.label{font:700 21px Inter,Arial,sans-serif}.title{font:800 58px Inter,Arial,sans-serif}.subtitle{font:400 30px Inter,Arial,sans-serif}.stepTitle{font:800 22px Inter,Arial,sans-serif}.stepText{font:400 21px Inter,Arial,sans-serif}.section{font:800 24px Inter,Arial,sans-serif}.num{font:800 24px Inter,Arial,sans-serif;fill:white}.arrow{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.iconBlue{stroke:#2563eb}.iconGreen{stroke:#059669}.iconAmber{stroke:#d97706}.iconPurple{stroke:#7c3aed}.icon{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect class="bg" width="1600" height="1050"/>
  <text x="800" y="70" text-anchor="middle" class="title ink">How the AI Assisted Enforcement POC Works</text>
  <text x="800" y="112" text-anchor="middle" class="subtitle muted">From a resident complaint to a smarter workload signal and clear closure</text>

  <rect x="70" y="145" width="690" height="82" rx="18" fill="url(#blueWash)"/>
  <g transform="translate(108 166)">
    <circle cx="20" cy="20" r="13" fill="#2563eb"/><circle cx="50" cy="20" r="13" fill="#2563eb" opacity="0.82"/><circle cx="80" cy="20" r="13" fill="#2563eb" opacity="0.68"/>
    <path d="M0 55c6-20 34-20 40 0M30 55c6-20 34-20 40 0M60 55c6-20 34-20 40 0" fill="#2563eb" opacity="0.85"/>
  </g>
  <text x="190" y="192" class="section blue">FOR RESIDENTS</text>
  <text x="360" y="193" class="body ink">Easy to report. Clear updates. Better outcomes.</text>
  <rect x="840" y="145" width="690" height="82" rx="18" fill="url(#greenWash)"/>
  <g transform="translate(880 164)">
    <circle cx="42" cy="22" r="16" fill="#059669"/><path d="M17 59c8-24 42-24 50 0" fill="#059669"/><path d="M76 8l20 10M75 30l24 2" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="980" y="192" class="section green">FOR CITY STAFF</text>
  <text x="1165" y="193" class="body ink">Smarter triage. Better visibility. Stronger decisions.</text>

  <g id="steps">
    <g transform="translate(70 255)">
      <rect class="card" width="220" height="260" rx="16"/><circle cx="28" cy="34" r="20" fill="#0b1835"/><text x="28" y="43" text-anchor="middle" class="num">1</text><text x="110" y="68" text-anchor="middle" class="stepTitle ink">Resident intake</text>
      <rect x="78" y="105" width="58" height="92" rx="8" class="icon iconBlue"/><circle cx="107" cy="178" r="4" fill="#2563eb"/><path d="M148 122c28 0 42 17 42 36s-14 36-42 36h-4l-20 18 6-22c-16-6-24-18-24-32 0-19 14-36 42-36z" fill="#477ee8"/><circle cx="138" cy="158" r="4" fill="#fff"/><circle cx="151" cy="158" r="4" fill="#fff"/><circle cx="164" cy="158" r="4" fill="#fff"/>
      <text x="110" y="218" text-anchor="middle" class="stepText ink">Issue submitted</text><text x="110" y="245" text-anchor="middle" class="stepText ink">by a resident</text>
    </g>
    <path class="arrow" d="M305 385h35m-10-10 10 10-10 10"/>
    <g transform="translate(345 255)">
      <rect class="card" width="230" height="260" rx="16"/><circle cx="28" cy="34" r="20" fill="#0b1835"/><text x="28" y="43" text-anchor="middle" class="num">2</text><text x="115" y="66" text-anchor="middle" class="stepTitle ink">Structured service</text><text x="115" y="94" text-anchor="middle" class="stepTitle ink">request</text>
      <rect x="78" y="116" width="72" height="88" rx="8" class="icon iconBlue"/><path d="M96 112h36" class="icon iconBlue"/><circle cx="114" cy="108" r="9" fill="#2563eb"/><path d="M96 145h10M96 170h10M96 195h10M120 145h36M120 170h36M120 195h22" class="icon iconBlue" stroke-width="5"/><circle cx="160" cy="197" r="29" fill="#477ee8"/><path d="M147 197l10 10 20-24" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>
      <text x="115" y="226" text-anchor="middle" class="stepText ink">Captured as clean,</text><text x="115" y="253" text-anchor="middle" class="stepText ink">reviewable data</text>
    </g>
    <path class="arrow" d="M590 385h35m-10-10 10 10-10 10"/>
    <g transform="translate(630 255)">
      <rect class="card" width="245" height="260" rx="16"/><circle cx="28" cy="34" r="20" fill="#0b1835"/><text x="28" y="43" text-anchor="middle" class="num">3</text><text x="122" y="66" text-anchor="middle" class="stepTitle ink">Staff triage and</text><text x="122" y="94" text-anchor="middle" class="stepTitle ink">priority review</text>
      <circle cx="90" cy="140" r="24" fill="#059669" opacity="0.85"/><path d="M52 205c8-40 68-40 76 0" fill="#059669" opacity="0.85"/><rect x="142" y="125" width="70" height="62" rx="4" class="icon iconGreen"/><path d="M158 172v-18M178 172v-34M198 172v-48" class="icon iconGreen"/>
      <text x="122" y="224" text-anchor="middle" class="stepText ink">Staff assesses priority</text><text x="122" y="251" text-anchor="middle" class="stepText ink">and context</text>
    </g>
    <path class="arrow" d="M890 385h35m-10-10 10 10-10 10"/>
    <g transform="translate(930 255)">
      <rect class="card" width="240" height="260" rx="16"/><circle cx="28" cy="34" r="20" fill="#0b1835"/><text x="28" y="43" text-anchor="middle" class="num">4</text><text x="120" y="76" text-anchor="middle" class="stepTitle ink">Field follow up</text>
      <path d="M120 113c-28 0-48 22-48 50 0 37 48 84 48 84s48-47 48-84c0-28-20-50-48-50z" fill="#059669" opacity="0.9"/><circle cx="120" cy="163" r="17" fill="#fff"/><path d="M58 223l40-25 44 25 44-25 24 16M58 223l22-61M142 223l24-61M98 198l20-36M186 198l20-36" class="icon iconGreen" stroke-width="4"/>
      <text x="120" y="218" text-anchor="middle" class="stepText ink">Officer records the</text><text x="120" y="245" text-anchor="middle" class="stepText ink">observed condition</text>
    </g>
    <path class="arrow" d="M1185 385h35m-10-10 10 10-10 10"/>
    <g transform="translate(1225 255)">
      <rect class="card" width="210" height="260" rx="16"/><circle cx="28" cy="34" r="20" fill="#0b1835"/><text x="28" y="43" text-anchor="middle" class="num">5</text><text x="105" y="66" text-anchor="middle" class="stepTitle ink">Closure draft</text><text x="105" y="94" text-anchor="middle" class="stepTitle ink">support</text>
      <path d="M78 116h58l38 38v63H78zM136 116v38h38" class="icon iconGreen"/><path d="M100 160h46M100 184h52M100 207h30" class="icon iconGreen" stroke-width="4"/><path d="M152 215l42-42 18 18-42 42-26 8z" class="icon iconGreen" stroke-width="5"/>
      <text x="105" y="226" text-anchor="middle" class="stepText ink">Draft wording prepared</text><text x="105" y="253" text-anchor="middle" class="stepText ink">for review</text>
    </g>
    <path class="arrow" d="M1450 385h35m-10-10 10 10-10 10"/>
    <g transform="translate(1475 255)">
      <rect class="card" width="55" height="260" rx="16" opacity="0"/>
    </g>
    <g transform="translate(70 550)">
      <rect class="card" width="1460" height="94" rx="16"/><circle cx="665" cy="31" r="20" fill="#0b1835"/><text x="665" y="40" text-anchor="middle" class="num">7</text><text x="715" y="39" class="section ink">Resident update</text><path d="M520 28h56v42h-56zM520 28l28 26 28-26" class="icon iconBlue" stroke-width="4"/><text x="715" y="72" class="small muted">Approved response sent to the resident</text>
    </g>
    <g transform="translate(1450 255)">
      <rect class="card" width="80" height="260" rx="16" opacity="0"/>
    </g>
    <g transform="translate(1375 255)">
      <rect class="card" width="155" height="260" rx="16"/><circle cx="28" cy="34" r="20" fill="#0b1835"/><text x="28" y="43" text-anchor="middle" class="num">6</text><text x="78" y="66" text-anchor="middle" class="stepTitle ink">Supervisor</text><text x="78" y="94" text-anchor="middle" class="stepTitle ink">approval</text><path d="M78 120l52 20v40c0 35-22 60-52 72-30-12-52-37-52-72v-40z" class="icon iconGreen"/><path d="M55 176l17 17 34-40" class="icon iconGreen"/>
      <text x="78" y="226" text-anchor="middle" class="stepText ink">Supervisor signs off</text><text x="78" y="253" text-anchor="middle" class="stepText ink">before closure</text>
    </g>
  </g>

  <text x="800" y="688" text-anchor="middle" class="label ink">SUPPORTED BY</text>
  <g transform="translate(70 715)">
    <rect class="card" width="462" height="215" rx="16"/><path d="M32 153v-34M58 153v-70M84 153v-112" class="icon iconBlue"/><text x="118" y="58" class="section blue">NYC 311 Pattern Intelligence</text><text x="118" y="90" class="small ink">Understand patterns using 3.4M public</text><text x="118" y="118" class="small ink">records from the past 12 months.</text>
    <rect x="28" y="145" width="150" height="32" rx="9" class="chipBlue"/><text x="103" y="167" text-anchor="middle" class="xs blue">NYC 311 records</text><rect x="190" y="145" width="144" height="32" rx="9" class="chipBlue"/><text x="262" y="167" text-anchor="middle" class="xs blue">Similar cases</text><rect x="28" y="184" width="184" height="32" rx="9" class="chipBlue"/><text x="120" y="206" text-anchor="middle" class="xs blue">Closure patterns</text>
  </g>
  <g transform="translate(569 715)">
    <rect class="card" width="462" height="215" rx="16"/><path d="M37 145l38-44 45 28 50-70" class="icon iconGreen"/><circle cx="37" cy="145" r="6" fill="#059669"/><circle cx="75" cy="101" r="6" fill="#059669"/><circle cx="120" cy="129" r="6" fill="#059669"/><circle cx="170" cy="59" r="6" fill="#059669"/><text x="118" y="58" class="section green">Operational Analytics</text><text x="118" y="90" class="small ink">Turn data into practical visibility for</text><text x="118" y="118" class="small ink">daily triage and resource planning.</text>
    <rect x="28" y="145" width="118" height="32" rx="9" class="chipGreen"/><text x="87" y="167" text-anchor="middle" class="xs green">Work queue</text><rect x="158" y="145" width="102" height="32" rx="9" class="chipGreen"/><text x="209" y="167" text-anchor="middle" class="xs green">Heat map</text><rect x="272" y="145" width="150" height="32" rx="9" class="chipGreen"/><text x="347" y="167" text-anchor="middle" class="xs green">Closure time</text><rect x="28" y="184" width="210" height="32" rx="9" class="chipGreen"/><text x="133" y="206" text-anchor="middle" class="xs green">Complaint pressure</text>
  </g>
  <g transform="translate(1068 715)">
    <rect class="card" width="462" height="215" rx="16"/><path d="M78 55v60l-38 66h95l-38-66V55M60 55h55" class="icon iconAmber"/><text x="118" y="58" class="section amber">Stress Testing and Simulation Lab</text><text x="118" y="90" class="small ink">Test workload scenarios before pressure</text><text x="118" y="118" class="small ink">turns into real bottlenecks.</text>
    <rect x="28" y="145" width="168" height="32" rx="9" class="chipAmber"/><text x="112" y="167" text-anchor="middle" class="xs amber">Synthetic patrol logs</text><rect x="208" y="145" width="138" height="32" rx="9" class="chipAmber"/><text x="277" y="167" text-anchor="middle" class="xs amber">Staff capacity</text><rect x="28" y="184" width="140" height="32" rx="9" class="chipAmber"/><text x="98" y="206" text-anchor="middle" class="xs amber">Backlog risk</text><rect x="180" y="184" width="176" height="32" rx="9" class="chipAmber"/><text x="268" y="206" text-anchor="middle" class="xs amber">CTGAN scenarios</text>
  </g>

  <g transform="translate(70 955)">
    <rect class="soft" width="1460" height="62" rx="14"/><text x="85" y="39" class="body ink">Analytics use 3.4M New York City 311 public records from the past 12 months. Resident submissions in this POC are demo data.</text>
    <g transform="translate(36 16)"><ellipse cx="0" cy="8" rx="22" ry="8" fill="#94a3b8"/><rect x="-22" y="8" width="44" height="22" fill="#94a3b8"/><ellipse cx="0" cy="30" rx="22" ry="8" fill="#64748b"/></g>
  </g>
</svg>
